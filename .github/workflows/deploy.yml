name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify required build artifacts
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/en/index.html
          test -f dist/privacy/index.html
          test -f dist/terms/index.html
          test ! -f dist/lunytales-v2/index.html

      - name: Smoke test built routes
        run: |
          set -euo pipefail
          python3 -m http.server --bind 127.0.0.1 --directory dist 4173 >/tmp/lunytales-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 1

          for route in / /en/ /privacy/ /terms/ /en/privacy/ /en/terms/ /sitemap.xml /robots.txt /styles.css /assets/demo/demo.pdf /assets/demo/demo_eng.pdf; do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:4173${route}")
            if [ "$status_code" != "200" ]; then
              echo "Route ${route} returned ${status_code}"
              exit 1
            fi
          done

          legacy_status_code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:4173/lunytales-v2/")
          if [ "$legacy_status_code" = "200" ]; then
            echo "Legacy route /lunytales-v2/ should not be served as HTTP 200"
            exit 1
          fi

      - name: Validate JSON-LD output on home pages
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          required_types = {"Organization", "WebSite", "CreativeWorkSeries"}

          for page in ("dist/index.html", "dist/en/index.html"):
              html = Path(page).read_text(encoding="utf-8")
              scripts = re.findall(
                  r'<script[^>]*type=["\']application/ld\+json["\'][^>]*>(.*?)</script>',
                  html,
                  flags=re.IGNORECASE | re.DOTALL,
              )
              if not scripts:
                  raise SystemExit(f"{page}: missing JSON-LD script block")

              found_valid_graph = False
              for raw_json in scripts:
                  payload = json.loads(raw_json)
                  if payload.get("@context") != "https://schema.org":
                      continue

                  graph = payload.get("@graph")
                  if not isinstance(graph, list):
                      continue

                  graph_types = {
                      item.get("@type")
                      for item in graph
                      if isinstance(item, dict) and isinstance(item.get("@type"), str)
                  }
                  if required_types.issubset(graph_types):
                      found_valid_graph = True
                      break

              if not found_valid_graph:
                  raise SystemExit(f"{page}: JSON-LD present but required graph types are missing")
          PY

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
