name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify required build artifacts
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/en/index.html
          test -f dist/privacy/index.html
          test -f dist/terms/index.html

      - name: Smoke test built routes
        run: |
          set -euo pipefail
          python3 -m http.server --bind 127.0.0.1 --directory dist 4173 >/tmp/lunytales-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 1

          for route in / /en/ /privacy/ /terms/ /styles.css /assets/demo/demo.pdf; do
            status_code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:4173${route}")
            if [ "$status_code" != "200" ]; then
              echo "Route ${route} returned ${status_code}"
              exit 1
            fi
          done

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
